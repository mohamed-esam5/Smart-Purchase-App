<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Purchase - تسجيل الدخول</title>
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2 id="auth-title">تسجيل الدخول</h2>
            <p class="auth-subtitle">مرحباً بك في تطبيق إدارة المشتريات الذكي</p>
            
            <form id="auth-form">
                <div class="input-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" required placeholder="example@mail.com">
                </div>
                
                <div class="input-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" id="submit-btn" class="btn-primary">دخول</button>
            </form>
            
            <div class="auth-toggle">
                <p id="toggle-text">ليس لديك حساب؟ <a href="#" id="toggle-link">إنشاء حساب جديد</a></p>
            </div>
            
            <div id="error-message" class="error-msg"></div>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
