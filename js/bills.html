<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Purchase - إدارة الفواتير</title>
    <link rel="stylesheet" href="css/bills.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <i class="fa-solid fa-wallet"></i>
                <span>Smart Purchase</span>
            </div>
            <nav class="nav-links">
                <a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> الرئيسية</a>
                <a href="bills.html" class="active"><i class="fa-solid fa-file-invoice-dollar"></i> الفواتير</a>
            </nav>
            <div class="user-actions">
                <button id="logout-btn" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> خروج</button>
            </div>
        </div>
    </header>

    <main class="bills-container">
        <div class="page-title-box">
            <div>
                <h2>إدارة المشتريات والفواتير</h2>
                <p>أضف وتابع فواتير كروت الائتمان وفترات السماح بدقة</p>
            </div>
            <button id="open-modal-btn" class="btn-add"><i class="fa-solid fa-plus"></i> إضافة فاتورة</button>
        </div>

        <div class="table-container">
            <table class="main-table">
                <thead>
                    <tr>
                        <th>البيان</th>
                        <th>المبلغ</th>
                        <th>تاريخ الشراء</th>
                        <th>تاريخ السداد (55 يوم)</th>
                        <th>الحالة</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="bills-table-body">
                    <tr>
                        <td colspan="6" style="text-align:center; color:#999; padding: 30px;">جاري تحميل فواتيرك بأمان...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="bill-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fa-solid fa-circle-plus"></i> إضافة فاتورة جديدة</h3>
                <span class="close-modal">&times;</span>
            </div>
            <form id="bill-form">
                <div class="form-group">
                    <label for="bill-title">بيان المشتريات (اسم السلعة/المكان)</label>
                    <input type="text" id="bill-title" required placeholder="مثال: شاحن GaN 45W أو مشتريات نون">
                </div>
                
                <div class="form-group">
                    <label for="bill-amount">المبلغ (ج.م)</label>
                    <input type="number" id="bill-amount" step="0.01" required placeholder="0.00">
                </div>

                <div class="form-group">
                    <label for="purchase-date">تاريخ الشراء</label>
                    <input type="date" id="purchase-date" required>
                </div>

                <button type="submit" class="btn-submit-form">حفظ الفاتورة واحتساب السماح</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/bills.js"></script>
</body>
</html>
